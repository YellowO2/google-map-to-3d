<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      #status {
        margin: 6px 2px 2px;
        font-size: 0.9rem;
        color: #2f3a4a;
      }

      canvas {
        display: block;
      }

      #treeContainer {
        margin-top: 1rem;
        padding: 1rem;
        background: #f8f9fa;
        border-radius: 8px;
        display: none;
      }

      #panoTree,
      #panoTree ul {
        list-style-type: none;
        padding-left: 1.5rem;
      }

      .tree-node {
        margin: 0.5rem 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .expand-btn {
        cursor: pointer;
        background: #e9ecef;
        border: 1px solid #ced4da;
        border-radius: 4px;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: #495057;
      }

      .expand-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .pano-id {
        font-family: monospace;
        color: #0d6efd;
      }

      .view-btn {
        font-size: 0.8rem;
        padding: 2px 8px;
      }

      #downloadSplatContainer {
        display: none;
        margin-top: 0.75rem;
        padding: 0.75rem;
        background: #e8f5e9;
        border-radius: 6px;
        border: 1px solid #a5d6a7;
      }

      #downloadSplatContainer h4 {
        margin: 0 0 0.5rem;
        font-size: 0.95rem;
      }

      #plyFileList {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      #plyFileList li {
        margin: 3px 0;
      }

      #plyFileList a {
        font-family: monospace;
        font-size: 0.85rem;
      }

      @media (prefers-color-scheme: dark) {
        #treeContainer {
          background: #1e1e1e;
        }
        .expand-btn {
          background: #2d2d2d;
          border-color: #404040;
          color: #e0e0e0;
        }
        .pano-id {
          color: #6ea8fe;
        }
        #downloadSplatContainer {
          background: #1b2e1b;
          border-color: #2e5f2e;
        }
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.178.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.178.0/examples/jsm/",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
        }
      }
    </script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  <body>
    <header class="container">
      <hgroup>
        <h1>Google map to 3D</h1>
      </hgroup>
    </header>

    <main class="container">
      <form id="searchForm">
        <fieldset role="group">
          <input
            id="mapsUrlInput"
            type="text"
            placeholder="Paste URL or lat,lon (with /@lat,lon or lat,lon directly)"
            required
          />
          <button type="submit">Load</button>
        </fieldset>

        <button type="button" id="exampleButton" class="secondary">
          Use Example Panorama
        </button>
      </form>
      <small id="status">Paste a Google Maps URL to start.</small>

      <!-- PANORAMA TREE CONTAINER -->
      <section id="treeContainer">
        <h3>Discovered Panoramas <span id="panoCount">(0)</span></h3>
        <div
          id="map"
          style="
            height: 400px;
            width: 100%;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid #dee2e6;
          "
        ></div>
        <label style="display: block; margin-bottom: 1rem">
          <input type="checkbox" id="depthCheckbox" /> Include Depth Maps (.npy format)
        </label>
        <div style="display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap;">
          <button id="downloadAllBtn" class="secondary">
            Download All Discovered
          </button>
          <button id="generateBtn" class="primary">
            Generate 3DGS
          </button>
        </div>

        <!-- PLY download links shown after generation -->
        <div id="downloadSplatContainer">
          <h4>3DGS Output Files</h4>
          <ul id="plyFileList"></ul>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
